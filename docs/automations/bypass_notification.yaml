# Eldes Alarm - Bypass Notification Automation
#
# When arming fails (e.g., a door is open), this automation sends an
# actionable notification to your phone. You can tap "Bypass & Arm"
# to arm with all zones bypassed, or "Cancel" to do nothing.
#
# SETUP:
# 1. Replace "notify.mobile_app_YOUR_PHONE" with your actual notify service
#    (check Settings > Devices > your phone > Notifications)
# 2. Copy this into your automations.yaml or paste via the HA automation editor
# 3. Restart or reload automations

- alias: "Eldes: Arming failed - bypass notification"
  id: eldes_arm_failed_bypass_notification
  trigger:
    - platform: event
      event_type: eldes_alarm_arm_failed
  action:
    - variables:
        partition_name: "{{ trigger.event.data.partition_name }}"
        arm_mode: "{{ trigger.event.data.mode }}"
        zone_names: >-
          {% set zones = trigger.event.data.zones %}
          {% if zones | length > 0 %}
            {{ zones | map(attribute='zone_name') | join(', ') }}
          {% else %}
            (unknown zones)
          {% endif %}
    - service: notify.mobile_app_YOUR_PHONE
      data:
        title: "Arming failed: {{ partition_name }}"
        message: "Could not arm. Configured zones: {{ zone_names }}"
        data:
          actions:
            - action: ELDES_BYPASS_ARM
              title: "Bypass & Arm"
            - action: ELDES_BYPASS_CANCEL
              title: "Cancel"
          timeout: 60
          tag: eldes_arm_failed

- alias: "Eldes: Bypass & Arm confirmed"
  id: eldes_bypass_arm_confirmed
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: ELDES_BYPASS_ARM
  action:
    - variables:
        arm_mode: >-
          {% set last = states.automation.eldes_arming_failed_bypass_notification.attributes.last_triggered %}
          armstay
    - service: >-
        {% if arm_mode == 'arm' %}
          eldes_alarm.arm_with_bypass
        {% else %}
          eldes_alarm.arm_home_with_bypass
        {% endif %}
      data:
        bypass_all: true
