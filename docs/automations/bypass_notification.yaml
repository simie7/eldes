# Eldes Alarm — Arm Failed: Bypass Notification
#
# Single automation with two triggers using trigger_id:
#   1. arm_failed  — fires when arming fails due to open zones,
#                    sends actionable notification with exact zone names
#   2. bypass_confirmed — fires when user taps "Bypass & Arm",
#                         calls retry_arm_with_bypass (uses stored context)
#
# SETUP:
#   Replace "notify.mobile_app_YOUR_PHONE" with your actual notify service
#   (Settings → Devices → your phone → Notifications)

alias: "Eldes: Arm Failed — Bypass Notification"
description: >-
  Sends a notification listing the exact open zones when arming fails.
  The user can tap Bypass & Arm to re-arm with those zones bypassed,
  or Cancel to do nothing. Context expires after 120 seconds.
triggers:
  - event_type: eldes_alarm_arm_failed
    trigger: event
    id: arm_failed
  - event_type: mobile_app_notification_action
    event_data:
      action: ELDES_BYPASS_ARM
    trigger: event
    id: bypass_confirmed
conditions: []
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: arm_failed
        sequence:
          - action: notify.mobile_app_YOUR_PHONE
            data:
              title: "Arming failed: {{ trigger.event.data.partition_name }}"
              message: >-
                Open zones: {{ trigger.event.data.active_zones | join(', ') }}
              data:
                actions:
                  - action: ELDES_BYPASS_ARM
                    title: Bypass & Arm
                  - action: ELDES_BYPASS_CANCEL
                    title: Cancel
                timeout: 60
                tag: eldes_arm_failed
      - conditions:
          - condition: trigger
            id: bypass_confirmed
        sequence:
          - action: eldes_alarm.retry_arm_with_bypass
            data: {}
mode: single
