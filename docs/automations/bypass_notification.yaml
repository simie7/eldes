# Eldes Alarm — Arm Failed: Person-Aware Bypass Notification
#
# Detects WHO tried to arm (via HA user context), resolves their
# phone, and sends the notification only to that person.
# Falls back to notify.notify (all devices) if the user can't
# be identified (e.g. armed from keypad or external app).
#
# HOW IT WORKS:
#   1. arm_failed trigger — the integration fires eldes_alarm_arm_failed
#      with context.user_id from the original service call
#   2. Jinja2 resolves user_id → person entity → device_tracker (source)
#      → notify.mobile_app_<device_name>
#   3. bypass_confirmed trigger — user taps "Bypass & Arm",
#      calls retry_arm_with_bypass (uses stored context, 120s expiry)
#
# REQUIREMENTS:
#   - Each HA user must have a Person entity linked to their account
#     (Settings → People)
#   - The person's primary device tracker must come from the Mobile App
#     integration (this is the default when using the HA Companion app)
#
# MANUAL OVERRIDE:
#   If auto-detection doesn't work for your setup, replace the
#   notify_service template with a hardcoded service name like:
#     notify_service: notify.mobile_app_your_phone

alias: "Eldes: Arm Failed — Bypass Notification"
description: >-
  Detects who tried to arm, sends bypass notification to their phone.
  Falls back to notify.notify if user cannot be identified.
triggers:
  - event_type: eldes_alarm_arm_failed
    trigger: event
    id: arm_failed
  - event_type: mobile_app_notification_action
    event_data:
      action: ELDES_BYPASS_ARM
    trigger: event
    id: bypass_confirmed
conditions: []
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: arm_failed
        sequence:
          - variables:
              user_id: "{{ trigger.event.context.user_id | default('') }}"
              notify_service: >-
                {% set ns = namespace(svc='notify.notify') %}
                {% if user_id %}
                  {% for person in states.person %}
                    {% if state_attr(person.entity_id, 'user_id') == user_id %}
                      {% set src = state_attr(person.entity_id, 'source') | default('') %}
                      {% if src.startswith('device_tracker.') %}
                        {% set ns.svc = 'notify.mobile_app_' ~ src.replace('device_tracker.', '') %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
                {{ ns.svc }}
          - action: "{{ notify_service }}"
            data:
              title: "Arming failed: {{ trigger.event.data.partition_name }}"
              message: >-
                Open zones: {{ trigger.event.data.active_zones | join(', ') }}
              data:
                actions:
                  - action: ELDES_BYPASS_ARM
                    title: Bypass & Arm
                  - action: ELDES_BYPASS_CANCEL
                    title: Cancel
                timeout: 60
                tag: eldes_arm_failed
      - conditions:
          - condition: trigger
            id: bypass_confirmed
        sequence:
          - action: eldes_alarm.retry_arm_with_bypass
            data: {}
mode: single
